<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ryan's Travel Blog</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <link rel="stylesheet" href="styles.css" />
  <script src="config.js"></script>
</head>
<body>

  <!-- Password gate (checked immediately after render to avoid flash) -->
  <div id="gate">
    <div id="gate-box">
      <p id="gate-eyebrow">Ryan's Travel Blog</p>
      <form id="gate-form">
        <input type="password" id="gate-password" placeholder="Password"
               autocomplete="current-password" autofocus />
        <button type="submit" id="gate-submit">Enter</button>
      </form>
      <p id="gate-error" class="hidden">Incorrect password.</p>
    </div>
  </div>
  <script>
    if (sessionStorage.getItem("site_auth") === "1") {
      document.getElementById("gate").style.display = "none";
    }
  </script>

  <!-- Burger button -->
  <button id="burger-btn" aria-label="Open menu">
    <span></span><span></span><span></span>
  </button>

  <!-- Drawer overlay -->
  <div id="drawer-overlay"></div>

  <!-- Side drawer -->
  <nav id="drawer">
    <button id="drawer-close" aria-label="Close menu">&#x2715;</button>
    <div id="drawer-content"></div>
  </nav>

  <!-- Login modal -->
  <div id="login-modal" class="modal hidden">
    <div class="modal-box">
      <h3>Ryan Login</h3>
      <input type="password" id="login-password" placeholder="Password" autocomplete="current-password" />
      <p id="login-error" class="form-error hidden">Incorrect password.</p>
      <div class="modal-actions">
        <button id="login-cancel" class="btn-secondary">Cancel</button>
        <button id="login-submit" class="btn-primary">Login</button>
      </div>
    </div>
  </div>

  <!-- Post panel -->
  <div id="post-panel" class="panel hidden">
    <div class="panel-header">
      <h2>Post Management</h2>
      <span id="publish-status"></span>
      <button class="panel-close" data-panel="post-panel" aria-label="Close">&#x2715;</button>
    </div>
    <div id="post-panel-body" class="panel-body"></div>
  </div>

  <!-- Analytics panel -->
  <div id="analytics-panel" class="panel hidden">
    <div class="panel-header">
      <h2>Analytics</h2>
      <button class="panel-close" data-panel="analytics-panel" aria-label="Close">&#x2715;</button>
    </div>
    <div id="analytics-body" class="panel-body"></div>
  </div>

  <!-- Hero -->
  <section class="hero">
    <div class="hero-content">
      <h1>Ryan's Travel Blog</h1>
      <p class="tagline">Follow along on my strangely combined travel-web development experience.</p>
    </div>
    <div class="hero-fade-bottom"></div>
  </section>

  <main>
    <section class="map-section">
      <div id="world-map"></div>
    </section>

    <section class="summary-section" id="summary-section">
      <div class="summary-card" id="summary-card">
        <div class="summary-label">
          <span class="summary-icon">&#10024;</span> AI Summary
        </div>
        <p class="summary-text" id="summary-text"></p>
      </div>
    </section>

    <section class="entries-section">
      <h2>Entries</h2>
      <div id="entries"></div>
    </section>
  </main>

  <footer>
    <p>&copy; Ryan's Travel Blog</p>
  </footer>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="entries.js"></script>
  <script src="admin.js"></script>
  <script src="main.js"></script>
</body>
</html>
